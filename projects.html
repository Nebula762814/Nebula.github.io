<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>nebula // projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0d0d;
  --surface:   #141414;
  --surface2:  #1a1a1a;
  --surface3:  #222222;
  --border:    #2a2a2a;
  --border2:   #383838;
  --text:      #e0e0e0;
  --text-dim:  #888;
  --text-faint:#555;
  --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.65;
}
.page{max-width:900px;margin:0 auto;padding:3rem 2rem 5rem}

/* ── TOP NAV ── */
.topnav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2.5rem;
  padding-bottom:1.5rem;
  border-bottom:1px solid var(--border);
}
.back-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  font-size:11px;color:var(--text-faint);text-decoration:none;
  transition:color .15s;
  letter-spacing:.05em;
}
.back-btn:hover{color:var(--text-dim)}
.page-heading{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}

/* ── SECTION LABEL ── */
.sec-label{
  font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:1.2rem;
  display:flex;align-items:center;gap:.8rem;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── PROJECT GRID ── */
.projects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:.8rem;
  margin-bottom:3rem;
}
@media(max-width:420px){.projects-grid{grid-template-columns:1fr}}

/* ── PROJECT CARD ── */
.proj-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:3px;
  cursor:pointer;
  transition:border-color .18s,background .15s;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.proj-card:hover{border-color:var(--border2);background:var(--surface2)}
.proj-thumb{
  width:100%;height:140px;
  background:var(--surface2);
  overflow:hidden;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.proj-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.proj-thumb-ph{
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  color:var(--text-faint);font-size:10px;letter-spacing:.08em;
}
.proj-thumb-ph svg{opacity:.25}
.proj-body{padding:.9rem 1rem;flex:1;display:flex;flex-direction:column;gap:.4rem}
.proj-name{font-size:13px;font-weight:700;color:var(--text)}
.proj-short{font-size:11px;color:var(--text-dim);line-height:1.55}
.proj-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:.6rem;
}
.proj-tag{
  font-size:10px;letter-spacing:.07em;
  border:1px solid var(--border2);
  color:var(--text-faint);padding:.12rem .45rem;border-radius:2px;
}
.proj-expand-hint{font-size:10px;color:var(--text-faint);letter-spacing:.04em}

/* ── MODAL OVERLAY ── */
.modal-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  z-index:100;
  overflow-y:auto;
  padding:2rem 1rem;
  animation:fadeIn .18s ease;
}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:4px;
  width:100%;max-width:760px;
  position:relative;
  animation:slideUp .2s ease;
}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
.modal-close{
  position:absolute;top:1rem;right:1rem;
  background:none;border:none;color:var(--text-faint);
  font-size:18px;cursor:pointer;line-height:1;padding:.2rem .4rem;
  font-family:var(--mono);
  transition:color .15s;
  z-index:2;
}
.modal-close:hover{color:var(--text)}
.modal-hero{
  width:100%;height:220px;
  object-fit:cover;
  border-bottom:1px solid var(--border);
  display:block;
}
.modal-hero[src=""]{display:none}
.modal-content{padding:2rem}
.modal-header{margin-bottom:1.5rem}
.modal-title{font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:.3rem}
.modal-subtitle{font-size:11px;color:var(--text-dim)}
.modal-section{margin-bottom:1.5rem}
.modal-sec-label{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:.7rem;
  border-bottom:1px solid var(--border);padding-bottom:.4rem;
}
.modal-body{font-size:12px;color:var(--text-dim);line-height:1.8}
.modal-body p+p{margin-top:.8rem}
.modal-gallery{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:.6rem;margin-top:.6rem;
}
.modal-gallery img{
  width:100%;border-radius:2px;border:1px solid var(--border);
  object-fit:cover;max-height:150px;
  cursor:zoom-in;
  transition:opacity .15s;
}
.modal-gallery img:hover{opacity:.85}
.tag-row{display:flex;flex-wrap:wrap;gap:.4rem}
.tag{
  font-size:10px;letter-spacing:.07em;
  border:1px solid var(--border2);color:var(--text-faint);
  padding:.15rem .55rem;border-radius:2px;
}
.modal-links{display:flex;flex-wrap:wrap;gap:.6rem}
.modal-link{
  font-size:11px;color:var(--text-dim);text-decoration:none;
  border:1px solid var(--border2);
  padding:.35rem .8rem;border-radius:2px;
  display:inline-flex;align-items:center;gap:.35rem;
  transition:border-color .15s,color .15s;
}
.modal-link:hover{border-color:var(--text-faint);color:var(--text)}

/* ── LIGHTBOX ── */
.lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.95);z-index:200;
  align-items:center;justify-content:center;cursor:zoom-out;
}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:2px}

/* ── FOOTER ── */
.footer-nav{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
  padding-top:2rem;border-top:1px solid var(--border);
}
.footer-note{font-size:11px;color:var(--text-faint)}
.btn{
  display:inline-flex;align-items:center;gap:.45rem;
  font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.55rem 1.2rem;border-radius:3px;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text);text-decoration:none;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.btn:hover{background:var(--surface3);border-color:var(--text-faint)}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:100;
}
#loading.hidden{display:none}
.loading-text{
  color:var(--text-faint);
  font-size:11px;
  letter-spacing:2px;
}
</style>
</head>
<body>
<div id="loading"><span class="loading-text">loading...</span></div>

<div class="page" id="page" style="display:none">
  <div class="topnav">
    <a href="index.html" class="back-btn">← back</a>
    <span class="page-heading">projects</span>
  </div>

  <div class="sec-label">selected work</div>
  <div class="projects-grid" id="projects-grid"></div>

  <div class="footer-nav">
    <span class="footer-note">click any project to read more</span>
    <a href="index.html" class="btn">← back to home</a>
  </div>
</div>

<!-- MODALS CONTAINER -->
<div id="modals-container"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
let portfolioData = {projects:[],experience:[],services:[]};

async function loadData(){
  try{
    let json;
    try{
      const r = await fetch('data.json?t=' + Date.now());
      json = await r.json();
    } catch(fetchErr){
      const xhr = new XMLHttpRequest();
      xhr.open('GET', 'data.json', false);
      xhr.send(null);
      if(xhr.status === 0 || xhr.status === 200){
        json = JSON.parse(xhr.responseText);
      } else {
        throw new Error('Failed to load');
      }
    }
    portfolioData = json;
    renderProjects();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('page').style.display = '';
  } catch(e){
    document.querySelector('.loading-text').textContent = 'failed to load data.json — try using a local server';
  }
}

function renderProjects(){
  const projects = portfolioData.projects || [];
  const grid = document.getElementById('projects-grid');
  const modals = document.getElementById('modals-container');

  if(!projects.length){
    grid.innerHTML = '<div style="color:var(--text-faint);font-size:11px;padding:2rem 0">no projects yet</div>';
    modals.innerHTML = '';
    return;
  }

  grid.innerHTML = projects.map(p => {
    const thumb = p.thumb ? 
      `<img src="${esc(p.thumb)}" alt="" onerror="this.style.display='none';this.parentElement.querySelector('.proj-thumb-ph').style.display='flex'">` : '';
    const hasThumb = p.thumb ? '' : 'style="display:flex"';
    return `
      <div class="proj-card" onclick="openModal('${esc(p.id)}')">
        <div class="proj-thumb">
          ${thumb}
          <div class="proj-thumb-ph" ${!p.thumb ? '' : 'style="display:none"'}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            <span>thumbnail</span>
          </div>
        </div>
        <div class="proj-body">
          <div class="proj-name">${esc(p.name)}</div>
          <div class="proj-short">${esc(p.short)}</div>
          <div class="proj-footer">
            <span class="proj-tag">${esc(p.tag)}</span>
            <span class="proj-expand-hint">click to expand ↗</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  modals.innerHTML = projects.map(p => {
    const hero = p.hero ? `<img class="modal-hero" src="${esc(p.hero)}" alt="" onerror="this.style.display='none'">` : '';
    const about = (p.about || []).map(para => `<p>${esc(para)}</p>`).join('');
    const stack = (p.stack || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    const gallery = (p.gallery || []).map(src => 
      `<img src="${esc(src)}" alt="" onerror="this.style.display='none'" onclick="lightbox(this)">`
    ).join('');
    const links = (p.links || []).map(l => 
      `<a href="${esc(l.url)}" class="modal-link" target="_blank">⌥ ${esc(l.label)}</a>`
    ).join('');

    return `
      <div class="modal-overlay" id="${esc(p.id)}" onclick="overlayClick(event,this)">
        <div class="modal">
          <button class="modal-close" onclick="closeModal('${esc(p.id)}')">✕</button>
          ${hero}
          <div class="modal-content">
            <div class="modal-header">
              <div class="modal-title">${esc(p.name)}</div>
              <div class="modal-subtitle">${esc(p.subtitle)}</div>
            </div>
            <div class="modal-section">
              <div class="modal-sec-label">about</div>
              <div class="modal-body">${about}</div>
            </div>
            ${stack ? `<div class="modal-section"><div class="modal-sec-label">stack</div><div class="tag-row">${stack}</div></div>` : ''}
            ${gallery ? `<div class="modal-section"><div class="modal-sec-label">screenshots</div><div class="modal-gallery">${gallery}</div></div>` : ''}
            ${links ? `<div class="modal-section"><div class="modal-sec-label">links</div><div class="modal-links">${links}</div></div>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function openModal(id){
  const el = document.getElementById(id);
  if(el){
    el.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
}
function closeModal(id){
  const el = document.getElementById(id);
  if(el){
    el.classList.remove('open');
    document.body.style.overflow = '';
  }
}
function overlayClick(e, overlay){
  if(e.target === overlay){
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }
}
function lightbox(img){
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox').classList.add('open');
  event.stopPropagation();
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
    closeLightbox();
    document.body.style.overflow = '';
  }
});

function esc(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
